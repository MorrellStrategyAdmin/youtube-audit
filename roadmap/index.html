<html lang="en">
<head>

<meta property="og:description" content="Answer 8 questions and get a step-by-step plan built for your business and where your channel is right now, starting with the one move that unlocks the most growth." />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  :root{
    --bg:#0A0B0D; --bg-elev:#121419; --bg-elev2:#171A20;
    --text:#F4F5F7; --muted:#9AA0A8; --faint:#6B7079;
    --line:rgba(255,255,255,0.09); --line-strong:rgba(255,255,255,0.16);
    --accent:#4F8CFF; --accent-soft:rgba(79,140,255,0.12); --accent-line:rgba(79,140,255,0.30);
    --good:#3FB98C; --warn:#E0A64F; --bad:#E0654F;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --display:'Space Grotesk','Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 18px 64px}
  a{color:inherit}
  .wrap{width:100%;max-width:620px;margin:0 auto}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:10px;justify-content:center;margin:6px 0 26px}
  .topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .topbar span{font-family:var(--display);font-weight:600;letter-spacing:.02em;font-size:14px;color:var(--muted)}

  /* progress */
  .progress{height:3px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:30px}
  .progress > i{display:block;height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1)}

  .card{background:var(--bg-elev);border:1px solid var(--line);border-radius:18px;padding:34px 30px}
  @media(max-width:520px){.card{padding:26px 20px}}

  .eyebrow{font-family:var(--display);font-size:12.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
  h1{font-family:var(--display);font-weight:700;font-size:30px;line-height:1.15;letter-spacing:-0.01em;margin-bottom:14px}
  h2{font-family:var(--display);font-weight:600;font-size:22px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:8px}
  .lead{color:var(--muted);font-size:16px;margin-bottom:26px}
  .q-count{font-family:var(--display);font-size:13px;color:var(--faint);margin-bottom:12px;font-weight:500}
  .q-title{font-family:var(--display);font-weight:600;font-size:21px;line-height:1.3;margin-bottom:20px;letter-spacing:-0.01em}

  .options{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--bg-elev2);border:1px solid var(--line);color:var(--text);
       padding:15px 16px;border-radius:12px;font-family:var(--sans);font-size:15.5px;cursor:pointer;transition:border-color .15s,background .15s,transform .05s}
  .opt:hover{border-color:var(--line-strong);background:#1B1F26}
  .opt:active{transform:scale(.995)}
  .opt .mark{flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:2px solid var(--line-strong);transition:border-color .15s,background .15s;position:relative}
  .opt.sel{border-color:var(--accent-line);background:var(--accent-soft)}
  .opt.sel .mark{border-color:var(--accent);background:var(--accent)}
  .opt.sel .mark:after{content:"";position:absolute;inset:4px;border-radius:50%;background:#0A0B0D}

  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:24px}
  .btn{font-family:var(--display);font-weight:600;font-size:15px;border:none;border-radius:11px;padding:13px 22px;cursor:pointer;transition:opacity .15s,transform .05s,background .15s}
  .btn:active{transform:scale(.985)}
  .btn-primary{background:var(--accent);color:#04060B}
  .btn-primary:hover{opacity:.92}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--muted);padding:13px 8px}
  .btn-ghost:hover{color:var(--text)}
  .btn-block{display:block;width:100%;text-align:center;text-decoration:none}
  .microcopy{color:var(--faint);font-size:13px;margin-top:16px;text-align:center}
  .microcopy.left{text-align:left}

  /* form */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
  .field input{width:100%;background:var(--bg-elev2);border:1px solid var(--line);border-radius:11px;color:var(--text);
       padding:14px 15px;font-family:var(--sans);font-size:15.5px;transition:border-color .15s}
  .field input:focus{outline:none;border-color:var(--accent-line)}
  .field input::placeholder{color:var(--faint)}

  /* result */
  .reframe{background:var(--bg-elev2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:12px;padding:18px 18px;margin:22px 0}
  .reframe .k{font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);font-family:var(--display);font-weight:600;margin-bottom:3px}
  .reframe .belief{color:var(--muted);font-size:15px;margin-bottom:12px}
  .reframe .real{font-family:var(--display);font-weight:600;font-size:18px;color:var(--text)}
  .reframe .real b{color:var(--accent)}
  .reframe p.exp{color:var(--muted);font-size:14.5px;margin-top:10px}

  .section-k{font-family:var(--display);font-size:12.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:26px 0 12px}
  .scores{display:flex;flex-direction:column;gap:13px}
  .score-row .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .score-row .name{font-size:14.5px;font-weight:500}
  .score-row .name .flag{font-family:var(--display);font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);margin-left:8px;vertical-align:middle}
  .score-row .val{font-family:var(--display);font-size:13px;color:var(--muted);font-weight:600}
  .bar{height:7px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}

  .fix{background:var(--bg-elev2);border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:12px}
  .fix p{color:var(--muted);font-size:14.5px;margin-bottom:10px}
  .moves{position:relative;margin-top:16px}
  .moves::before{content:"";position:absolute;left:15px;top:15px;bottom:15px;width:2px;background:linear-gradient(to bottom,var(--accent),rgba(79,140,255,0.08))}
  .move{position:relative;display:flex;gap:14px;padding-bottom:16px}
  .move:last-child{padding-bottom:0}
  .move .mnum{flex:0 0 31px;width:31px;height:31px;border-radius:50%;background:var(--bg-elev2);border:1.5px solid var(--accent-line);color:var(--accent);font-family:var(--display);font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;z-index:1;box-shadow:0 0 0 4px var(--bg-elev2)}
  .move .mtext{padding-top:6px;font-size:14.5px;line-height:1.5;color:var(--text)}
  .move .mtext b{font-weight:650}

  /* 90-day timeline — matches the /offer page's plan component exactly */
  .timeline{position:relative;margin-top:22px}
  .timeline::before{content:"";position:absolute;left:21px;top:14px;bottom:14px;width:2px;background:linear-gradient(to bottom,var(--accent),rgba(79,140,255,.12))}
  .tnode{position:relative;display:flex;gap:20px;padding-bottom:26px}
  .tnode:last-child{padding-bottom:0}
  .tnum{flex:0 0 44px;width:44px;height:44px;border-radius:50%;background:var(--bg-elev);border:2px solid var(--accent);color:var(--accent);font-family:var(--display);font-weight:700;font-size:1.1rem;display:flex;align-items:center;justify-content:center;z-index:1;box-shadow:0 0 0 5px var(--bg-elev)}
  .tbody{padding-top:5px}
  .tbody h3{font-family:var(--display);font-size:1.2rem;font-weight:700;letter-spacing:-0.01em;margin-bottom:8px}
  .tbody ul{list-style:none;margin:0;padding:0}
  .tbody li{color:var(--muted);font-size:0.95rem;padding-left:18px;position:relative;margin:7px 0}
  .tbody li::before{content:"";position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.7}

  /* proof — identical to the /offer page's hero-clients block */
  .hero-clients{margin-top:20px;text-align:center}
  .hero-clients-label{font-size:0.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-bottom:18px}
  .hero-faces{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:22px 4px;justify-items:center}
  @media(max-width:520px){.hero-faces{grid-template-columns:repeat(3,minmax(0,1fr));gap:20px 4px}}
  .hero-faces .client{display:flex;flex-direction:column;align-items:center;gap:9px;min-width:0}
  .hero-faces .avatar{width:56px;height:56px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,0.16);background:var(--bg-elev2);display:flex;align-items:center;justify-content:center}
  .hero-faces .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .hero-faces .cname{font-size:0.72rem;letter-spacing:-0.01em;color:var(--muted);font-weight:500}

  .cta{margin-top:26px;padding:24px 22px;border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:14px;text-align:center}
  .cta h2{margin-bottom:8px}
  .cta p{color:var(--muted);font-size:14.5px;margin-bottom:18px}
  .cta .guar{color:var(--faint);font-size:12.5px;margin-top:12px}


  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .demo-tag{position:fixed;bottom:10px;right:10px;font-size:10.5px;color:var(--faint);background:var(--bg-elev);border:1px solid var(--line);border-radius:6px;padding:3px 7px;font-family:var(--display);letter-spacing:.03em}
</style>
</head>

  <div class="wrap">

<script>
/* =======================================================================
   CONFIG: the only block to change when you deploy on your own stack.
   Leave endpoint empty to run in preview/demo mode (no data leaves the page).
   Set endpoint to your Supabase Edge Function URL to go live.
   ======================================================================= */
const CONFIG = {
  endpoint: "https://gjfrarupnpsfiolpgtdc.supabase.co/functions/v1/capture-lead",                                             // e.g. "https://<proj>.supabase.co/functions/v1/capture-lead"
  anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnJhcnVwbnBzZmlvbHBndGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Njg0NjEsImV4cCI6MjA5ODM0NDQ2MX0.sGW9weCJD02awUeZ482x-WByksTDi1vpwgKrFNjV0xQ",                                             // Supabase anon key, sent as Bearer for the Edge Function
  calLink:  "https://cal.com/dominic-morrell-2/youtube-audit-call", // the free live audit
  siteUrl:  "https://morrellstrategy.com",
  strategyUrl: "https://morrellstrategy.com"                // where the lighter Strategy track lives
};

/* ----------------------------- QUESTIONS ------------------------------ */
const QUESTIONS = [
  { id:"business", q:"What kind of business do you run?", opts:[
      {v:"service", t:"Service business (agency, done-for-you, financial services, etc.)"},
      {v:"coaching",t:"Coaching, consulting, education or info product"},
      {v:"saas",    t:"SaaS / software"},
      {v:"ecom",    t:"Ecommerce / physical product"},
      {v:"creator", t:"Personal brand / creator"},
      {v:"other",   t:"Something else"} ]},
  { id:"views", q:"What do your long-form videos average in views?", opts:[
      {v:"na",     t:"Haven't posted yet"},
      {v:"u500",   t:"Under 500"},
      {v:"500_2k", t:"500-2,000"},
      {v:"2k_10k", t:"2,000-10,000"},
      {v:"10k_50k",t:"10,000-50,000"},
      {v:"50kp",   t:"50,000+"} ]},
  { id:"retention", q:"What's your average viewer retention like?", opts:[
      {v:"strong", t:"Strong, most people stick around"},
      {v:"weak",   t:"Weak, people drop off early"},
      {v:"dunno",  t:"I don't know"} ]},
  { id:"cadence", q:"How often do you publish long-form videos?", opts:[
      {v:"rarely",  t:"Rarely, or not right now"},
      {v:"monthly", t:"A few times a month"},
      {v:"weekly",  t:"About once a week (consistent)"},
      {v:"multi",   t:"Two or more times a week"} ]},
  { id:"process", q:"How do you decide what to make and how to package it?", opts:[
      {v:"no",   t:"No real process, I make what I feel like"},
      {v:"adhoc",t:"Some thought, but it's inconsistent"},
      {v:"yes",  t:"I research proven topics and package before I film"} ]},
  { id:"targeting", q:"Are you attracting your ideal buyers, or the wrong crowd?", opts:[
      {v:"wrong", t:"Mostly the wrong crowd (too junior, not my buyer)"},
      {v:"mix",   t:"A mix of the right and wrong people"},
      {v:"right", t:"Mostly the right people"},
      {v:"na",    t:"Not sure"} ]},
  { id:"ytrev", q:"How much revenue is YouTube generating for you right now?", opts:[
      {v:"none",    t:"Nothing yet"},
      {v:"under10", t:"Under $10k a month"},
      {v:"10_50",   t:"$10k-$50k a month"},
      {v:"50_100",  t:"$50k-$100k a month"},
      {v:"100p",    t:"$100k+ a month"},
      {v:"dunno",   t:"I don't know"} ]},
  { id:"revenue", q:"What's your total monthly revenue?", opts:[
      {v:"u20",    t:"Under $20k"},
      {v:"20_50",  t:"$20k-$50k"},
      {v:"50_100", t:"$50k-$100k"},
      {v:"100_250",t:"$100k-$250k"},
      {v:"250p",   t:"$250k+"} ]}
];

const STATE = { step:-1, answers:{}, lead:{}, sent:false };
const app = document.getElementById('app');
const progressBar = document.getElementById('progressBar');
const TOTAL = QUESTIONS.length + 2; // intro + questions + capture ; result not counted

if (CONFIG.endpoint === "") document.getElementById('demoTag').style.display = 'block';

/* ------------------------------- LABELS ------------------------------- */
const LABEL = {
  viewsText:{na:"no videos posted yet",u500:"under 500 views a video",'500_2k':"500-2,000 views a video",'2k_10k':"2,000-10,000 views a video",'10k_50k':"10,000-50,000 views a video",'50kp':"50,000+ views a video"}
};

/* ----------------------------- RENDERING ------------------------------ */
function setProgress(){
  let pct;
  if (STATE.step < 0) pct = 0;
  else if (STATE.step >= TOTAL) pct = 100;
  else pct = Math.round((STATE.step / (TOTAL)) * 100);
  progressBar.style.width = pct + "%";
}

function render(){
  setProgress();
  if (STATE.step === -1) return renderIntro();
  if (STATE.step >= 0 && STATE.step < QUESTIONS.length) return renderQuestion(STATE.step);
  if (STATE.step === QUESTIONS.length) return renderCapture();
  return renderResult();
}

function renderIntro(){
  app.innerHTML = `
    <div class="card fade">
      <div class="eyebrow">The YouTube Growth Roadmap</div>
      <h1>Get more customers from YouTube, starting today.</h1>
      <p class="lead">Answer 8 questions and get a step-by-step roadmap built for your business and where your channel is right now, starting with the one move that matters most. Takes about 60 seconds.</p>
      <button class="btn btn-primary btn-block" onclick="next()">Get my roadmap</button>
      <p class="microcopy">Built from the same playbook we run for operators doing $1M+/month.</p>
    </div>`;
}

function renderQuestion(i){
  const Q = QUESTIONS[i];
  const cur = STATE.answers[Q.id];
  app.innerHTML = `
    <div class="card fade">
      <div class="q-count">Question ${i+1} of ${QUESTIONS.length}</div>
      <div class="q-title">${Q.q}</div>
      <div class="options">
        ${Q.opts.map(o=>`
          <button class="opt ${cur===o.v?'sel':''}" onclick="choose('${Q.id}','${o.v}')">
            <span class="mark"></span><span>${o.t}</span>
          </button>`).join('')}
      </div>
      <div class="nav">
        <button class="btn btn-ghost" onclick="back()">← Back</button>
        <button class="btn btn-primary" ${cur?'':'disabled'} onclick="next()">Continue</button>
      </div>
    </div>`;
}

function renderCapture(){
  const L = STATE.lead;
  app.innerHTML = `
    <div class="card fade">
      <div class="q-count">Last step</div>
      <div class="q-title">Where can we reach you?</div>
      <div class="field">
        <label>First name</label>
        <input id="f_name" placeholder="Your first name" value="${L.name||''}" oninput="onLead()" />
      </div>
      <div class="field">
        <label>Email</label>
        <input id="f_email" type="email" placeholder="you@company.com" value="${L.email||''}" oninput="onLead()" />
      </div>
      <div class="field">
        <label>Instagram handle</label>
        <input id="f_ig" placeholder="@yourhandle" value="${L.ig||''}" oninput="onLead()" />
      </div>
      <div class="field">
        <label>YouTube channel <span style="color:var(--faint)">(optional)</span></label>
        <input id="f_channel" placeholder="youtube.com/@yourchannel" value="${L.channel||''}" oninput="onLead()" />
      </div>
      <button class="btn btn-primary btn-block" id="submitBtn" ${leadValid()?'':'disabled'} onclick="submitLead()">Show my roadmap</button>
      <p class="microcopy left">Enter your details to see your roadmap. If you're a fit, someone from our team will reach out with your next step. No spam.</p>
      <div class="nav"><button class="btn btn-ghost" onclick="back()">← Back</button><span></span></div>
    </div>`;
}

/* --------------------------- DIAGNOSIS ENGINE ------------------------- */
function scoreReach(a){
  // Views is the dominant signal of reach, but raw view counts are niche-dependent,
  // so they are scored conservatively: 10k views is only "good" in some niches, so the
  // 10k-50k band is mid-scale, and even 50k+ is not a guaranteed win.
  const v = {na:8,u500:16,'500_2k':28,'2k_10k':42,'10k_50k':58,'50kp':74}[a.views] ?? 30;
  const p = {yes:8,adhoc:0,no:-10}[a.process] ?? 0;   // idea + packaging process
  return clamp(v + p);
}
function scoreQuality(a){
  if (a.retention==="weak") return clamp(20);
  // Self-reported "strong" is optimistic, so it is not a free 80. It only reads as
  // elite when the view count backs it up.
  if (a.retention==="strong")
    return clamp({na:55,u500:55,'500_2k':60,'2k_10k':66,'10k_50k':74,'50kp':80}[a.views] ?? 62);
  // "I don't know": infer from views. Really low views usually means low retention.
  return clamp({na:30,u500:30,'500_2k':42,'2k_10k':52,'10k_50k':62,'50kp':68}[a.views] ?? 44);
}
function scoreConversion(a){
  const t = {wrong:15,mix:40,right:68,na:38}[a.targeting] ?? 38;             // are they pulling the buyer
  // $10-50k/mo from YouTube is not "high", so it scores mid. "High" is $100k+/mo.
  const r = {none:10,under10:32,'10_50':50,'50_100':66,'100p':84,dunno:40}[a.ytrev] ?? 40;
  return clamp(Math.round((t + r) / 2));
}
function scoreConsistency(a){
  // Once a week is better than nothing but not optimal (48). Two or more a week is
  // the strong signal.
  const c = {rarely:12,monthly:28,weekly:48,multi:72}[a.cadence] ?? 40;
  const v = a.views==="na" ? -14 : 0;
  return clamp(c + v);
}
function clamp(n){return Math.max(6,Math.min(96,Math.round(n)))}

function diagnose(a){
  const scores = {
    reach: scoreReach(a),
    quality: scoreQuality(a),
    conversion: scoreConversion(a),
    consistency: scoreConsistency(a)
  };
  // Verify from the data. Order: no output first, then whether they HOLD the click
  // (retention -> quality) vs GET it (low views -> reach), then who they pull + whether
  // it actually earns revenue (conversion). Don't-know retention + <500 views = low retention.
  let key;
  if (a.views==="na" || a.cadence==="rarely") key = "consistency";
  else if (a.retention==="weak") key = "quality";
  else if (a.retention==="dunno" && a.views==="u500") key = "quality";
  else if (a.views==="u500" || a.views==="500_2k") key = "reach";
  else if (a.targeting==="wrong" || a.ytrev==="none" || a.ytrev==="under10") key = "conversion";
  else {
    const order = Object.entries(scores).sort((x,y)=>x[1]-y[1]);
    key = order[0][0];
  }
  return { scores, key };
}

const BOTTLENECK = {
  reach:{ name:"Reach", scoreKey:"reach",
    real:"<b>reach</b>",
    exp:a=>`Not enough of the right people are seeing your videos yet (you're averaging ${LABEL.viewsText[a.views]}). It comes down to two things, proven ideas and packaging good enough to get clicked. Get those right and the views, then the customers, follow.`,
    fixP:"Reach comes from proven ideas and packaging good enough to get clicked.",
    fix:["Work from proven demand instead of guessing. Study the outliers in and around your niche, where channels under 50k subs give the cleanest signal, and pull out the winning topics, formats, titles and thumbnails.",
         "Then go further than copying them. Find the topics, problems and outcomes your ideal viewer wants that nobody has covered well yet, and look past the obvious problem to the second and third-order ones underneath.",
         "Blend those winners into something that's your own, and take packaging ideas from other niches rather than the same ones your direct competitors use.",
         "Package for a broad audience, and keep the title and thumbnail honest to the video. If the thumbnail is hyper-edited but the video is raw, people click and bounce."] },
  quality:{ name:"Content quality", scoreKey:"quality",
    real:"<b>content quality</b>",
    exp:a=>`People are clicking, but the video isn't holding them or standing out. Usually it's a weak script, editing that doesn't fit the audience, or ideas anyone could get from a chatbot in five minutes. If viewers don't stick, the algorithm has no reason to keep showing you.`,
    fixP:"Make the video good enough that people stay. That's what gets you shown to more of them.",
    fix:["Open the first 30 seconds with a pattern interrupt to grab attention, then give them Proof for why they should listen, the Promise of what they'll get, and the Plan for how you'll deliver it. Echo your title and thumbnail so they know they clicked the right thing, and aim to hold 60% or more through the intro.",
         "Write from a proven scripting framework so every video has a structure that keeps people watching, instead of starting from a blank page each time.",
         "Match your editing, scripting and format to the exact audience you want to keep. Heavy edits suit a different viewer than a slow, dense breakdown, so build for the person who buys from you.",
         "Keep testing new formats instead of settling into one. Formats that feel fresh to your niche stand out, so treat a few videos a month as experiments and keep the ones that work.",
         "Run every idea through three checks. Could AI have written it, how many times has the niche seen it already, and what's genuinely different about yours? Cut anything generic."] },
  conversion:{ name:"Conversion", scoreKey:"conversion",
    real:"<b>conversion</b>",
    exp:a=>`You're getting views, but they're coming from the wrong crowd, and the few who would buy aren't being guided toward your offer. There's no content funnel, nothing in the middle or bottom for a serious prospect to watch.`,
    fixP:"Pull in the right audience, then build the content funnel that converts them.",

/* --------------------------- QUALIFICATION ---------------------------- */
function qualify(a){
  const fit = ["service","coaching","saas"].includes(a.business);
  const revQualified = ["20_50","50_100","100_250","250p"].includes(a.revenue);
  const bigOperator = ["100_250","250p"].includes(a.revenue);
  let tier;
  if (fit && revQualified) tier = "A";
  else if (fit && !revQualified) tier = "C";
  else tier = "D";
  return { tier, fit, revQualified, bigOperator };
}

  const dims = [
    {k:"reach",name:"Reach"},
    {k:"quality",name:"Content quality"},
    {k:"conversion",name:"Conversion"},
    {k:"consistency",name:"Consistency"}

  const flaggedDim = B.scoreKey;
  const barColor = s => s>=66?"var(--good)":s>=40?"var(--warn)":"var(--bad)";

function escapeHTML(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

/* ------------------------------ ACTIONS ------------------------------- */
function choose(id,v){ STATE.answers[id]=v; render(); }
function next(){ STATE.step++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function back(){ if(STATE.step>-1){STATE.step--; render(); window.scrollTo({top:0,behavior:'smooth'});} }

function onLead(){
  STATE.lead.name = val('f_name');
  STATE.lead.email = val('f_email');
  STATE.lead.ig = val('f_ig');
  STATE.lead.channel = val('f_channel');
  const b = document.getElementById('submitBtn');
  if (b) b.disabled = !leadValid();
}
function val(id){const e=document.getElementById(id);return e?e.value:''}
function leadValid(){
  const n=(STATE.lead.name||'').trim();
  const e=(STATE.lead.email||'').trim();
  const ig=(STATE.lead.ig||'').trim().replace(/^@+/,'');
  return n.length>0 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e) && ig.length>=2;
}

async function submitLead(){
  if(!leadValid()) return;
  const a = STATE.answers;
  const { scores, key } = diagnose(a);
  const Q = qualify(a);
  const payload = {
    name: STATE.lead.name.trim(),
    email: STATE.lead.email.trim(),
    instagram: "@"+STATE.lead.ig.trim().replace(/^@+/,''),
    channel: (STATE.lead.channel||'').trim(),
    answers: a,
    real_bottleneck: key,
    scores,
    tier: Q.tier,
    business: a.business,
    revenue: a.revenue,
    source: "youtube-growth-roadmap",
    page: location.href
  };
  // fire-and-forget capture; never block the result on it
  if (CONFIG.endpoint){
    try{
      fetch(CONFIG.endpoint,{
        method:"POST",
        headers:{ "Content-Type":"application/json", ...(CONFIG.anonKey?{"Authorization":"Bearer "+CONFIG.anonKey,"apikey":CONFIG.anonKey}:{}) },
        body: JSON.stringify(payload)
      }).catch(()=>{});
    }catch(e){}
  } else {
    console.log("[BOTTLENECK · demo capture] would POST:", payload);
  }
  STATE.sent = true;
  STATE.step = QUESTIONS.length + 1;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ------------------------------- BOOT --------------------------------- */
render();
</script>
