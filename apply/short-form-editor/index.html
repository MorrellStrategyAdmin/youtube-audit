<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Short-Form Editor (CapCut) · Apply | Morrell Strategy</title>
<meta property="og:title" content="We're hiring a CapCut editor" />
<meta property="og:description" content="Minimal-style short-form editing. Portfolio in the style required. Serious applicants only." />
<link rel="icon" href="/favicon-32.png" sizes="32x32" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script defer src="/track.js"></script>
<style>
  :root{
    --bg:#0A0B0D; --bg-elev:#121419; --bg-elev2:#171A20;
    --text:#F4F5F7; --muted:#9AA0A8; --faint:#6B7079;
    --line:rgba(255,255,255,0.09); --line-strong:rgba(255,255,255,0.16);
    --accent:#4F8CFF; --accent-soft:rgba(79,140,255,0.12); --accent-line:rgba(79,140,255,0.30);
    --good:#3FB98C; --warn:#E0A64F; --bad:#E0654F;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --display:'Space Grotesk','Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 18px 64px}
  a{color:var(--accent)}
  .wrap{width:100%;max-width:620px;margin:0 auto}

  .topbar{display:flex;align-items:center;gap:10px;justify-content:center;margin:6px 0 26px}
  .topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .topbar span{font-family:var(--display);font-weight:600;letter-spacing:.02em;font-size:14px;color:var(--muted)}

  .card{background:var(--bg-elev);border:1px solid var(--line);border-radius:18px;padding:34px 30px;margin-bottom:16px}
  @media(max-width:520px){.card{padding:26px 20px}}

  .eyebrow{font-family:var(--display);font-size:12.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
  h1{font-family:var(--display);font-weight:700;font-size:30px;line-height:1.15;letter-spacing:-0.01em;margin-bottom:14px}
  .lead{color:var(--muted);font-size:16px}
  .lead + .lead{margin-top:12px}
  .lead b{color:var(--text);font-weight:600}

  .bar-note{margin-top:20px;padding:14px 16px;border-radius:11px;background:var(--bg-elev2);border:1px solid var(--line);border-left:3px solid var(--warn);font-size:14px;color:var(--muted)}
  .bar-note b{color:var(--text);font-weight:600}

  .sec-k{font-family:var(--display);font-size:12.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:16px}

  .field{margin-bottom:18px}
  .field:last-child{margin-bottom:0}
  .field label{display:block;font-size:14px;color:var(--text);margin-bottom:7px;font-weight:500}
  .field .req{color:var(--accent);margin-left:2px}
  .field .hint{display:block;font-size:12.5px;color:var(--faint);margin:-3px 0 8px;font-weight:400}
  .field input,.field textarea{width:100%;background:var(--bg-elev2);border:1px solid var(--line);border-radius:11px;color:var(--text);
       padding:13px 15px;font-family:var(--sans);font-size:15.5px;transition:border-color .15s;resize:vertical}
  .field textarea{min-height:78px;line-height:1.5}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent-line)}
  .field input::placeholder,.field textarea::placeholder{color:var(--faint)}
  .field.err input,.field.err textarea,.field.err .opts{border-color:var(--bad)!important}

  .opts{display:flex;flex-wrap:wrap;gap:9px}
  .opt{display:inline-flex;align-items:center;gap:9px;background:var(--bg-elev2);border:1px solid var(--line);color:var(--text);
       padding:11px 15px;border-radius:10px;font-size:14.5px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
  .opt:hover{border-color:var(--line-strong)}
  .opt .dot2{width:15px;height:15px;border-radius:50%;border:2px solid var(--line-strong);position:relative;transition:.15s}
  .opt.sel{border-color:var(--accent-line);background:var(--accent-soft)}
  .opt.sel .dot2{border-color:var(--accent);background:var(--accent)}
  .opt.sel .dot2:after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--bg-elev2)}

  .btn{font-family:var(--display);font-weight:600;font-size:15.5px;border:none;border-radius:11px;padding:15px 22px;cursor:pointer;transition:opacity .15s,transform .05s;width:100%}
  .btn:active{transform:scale(.99)}
  .btn-primary{background:var(--accent);color:#04060B}
  .btn-primary:hover{opacity:.92}
  .microcopy{color:var(--faint);font-size:13px;margin-top:14px;text-align:center}
  .err-summary{display:none;margin-bottom:16px;padding:12px 15px;border-radius:10px;background:rgba(224,101,79,0.1);border:1px solid rgba(224,101,79,0.3);color:#e9a08f;font-size:14px}
  .err-summary.show{display:block}

  .thanks{text-align:center;padding:44px 30px}
  .thanks .big{width:56px;height:56px;border-radius:50%;background:var(--accent-soft);border:1px solid var(--accent-line);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
  .thanks .big:after{content:"";width:16px;height:26px;border:solid var(--accent);border-width:0 3px 3px 0;transform:rotate(45deg);margin-top:-6px}
  .thanks h1{margin-bottom:12px}
  .thanks .lead{margin-bottom:0}

  .fade{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .demo-tag{position:fixed;bottom:10px;right:10px;font-size:10.5px;color:var(--faint);background:var(--bg-elev);border:1px solid var(--line);border-radius:6px;padding:3px 7px;font-family:var(--display);letter-spacing:.03em}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar"><i class="dot"></i><span>Morrell Strategy</span></div>
    <div id="app"></div>
  </div>
  <div class="demo-tag" id="demoTag" style="display:none">preview mode · nothing is submitted</div>

<script>
/* CONFIG: the only block to change when you deploy.
   endpoint "" = preview mode (nothing leaves the page).
   Live: https://gjfrarupnpsfiolpgtdc.supabase.co/functions/v1/apply-candidate */
const CONFIG = {
  endpoint:   "https://gjfrarupnpsfiolpgtdc.supabase.co/functions/v1/apply-candidate",
  anonKey:    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZnJhcnVwbnBzZmlvbHBndGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Njg0NjEsImV4cCI6MjA5ODM0NDQ2MX0.sGW9weCJD02awUeZ482x-WByksTDi1vpwgKrFNjV0xQ",
  role:       "short-form-editor",
  role_label: "Short-Form Editor"
};

function field(id,label,{type="text",required=true,hint="",ph=""}={}){
  const tag = type==="textarea"
    ? `<textarea id="${id}" placeholder="${ph}"></textarea>`
    : `<input id="${id}" type="${type}" placeholder="${ph}" />`;
  return `<div class="field" data-for="${id}">
    <label>${label}${required?'<span class="req">*</span>':''}</label>
    ${hint?`<span class="hint">${hint}</span>`:''}
    ${tag}
  </div>`;
}
function choice(id,label,opts,hint=""){
  return `<div class="field" data-for="${id}" data-single="1">
    <label>${label}<span class="req">*</span></label>
    ${hint?`<span class="hint">${hint}</span>`:''}
    <div class="opts">${opts.map(o=>`<button type="button" class="opt" data-v="${o}"><span class="dot2"></span>${o}</button>`).join('')}</div>
  </div>`;
}

function renderForm(){
  document.getElementById('app').innerHTML = `
    <div class="card fade">
      <div class="eyebrow">Morrell Strategy · Now hiring</div>
      <h1>Short-Form Editor (CapCut)</h1>
      <p class="lead">We're hiring an editor for short-form on TikTok and Instagram. The style is deliberately minimal: <b>simple captions, clean cuts, usually no music and no animation</b>.</p>
      <p class="lead">If that's your lane and you're fast, this is quick to apply. Paid, ongoing work.</p>
      <div class="bar-note">Two things matter most: a <b>portfolio with work in this minimal style</b>, and how fast you turn a reel around. Off-style or flashy work won't count, so link the most relevant samples you have.</div>
    </div>

    <div class="err-summary" id="errSummary">A few required questions are missing. They're marked in red below.</div>

    <div class="card">
      <div class="sec-k">About you</div>
      ${field("name","Full name",{ph:"First and last"})}
      ${field("email","Email",{type:"email",ph:"you@email.com"})}
      ${field("instagram","Instagram handle",{ph:"@yourhandle"})}
      ${field("whatsapp","WhatsApp number (with country code)",{type:"tel",ph:"+44 …"})}
      ${field("timezone","What timezone are you in?",{ph:"e.g. GMT+0, EST, GMT+5:30"})}
    </div>

    <div class="card">
      <div class="sec-k">CapCut and your work</div>
      ${choice("capcut","Are you confident editing in CapCut?",["Yes, it's my main tool","Yes, comfortable in it","No"])}
      ${field("portfolio","Portfolio link",{type:"url",ph:"https://…",hint:"Prioritise videos in this minimal style: simple captions, clean cuts, no music or animation. Off-style work won't be considered."})}
      ${field("sample","Link one reel you edited in this style",{type:"url",ph:"TikTok / Reel URL"})}
      ${field("sample_role","On that reel, what exactly did you do?",{type:"textarea",hint:"Be honest. Cuts, captions, pacing, sourcing footage, all of it, or just part."})}
    </div>

    <div class="card">
      <div class="sec-k">How you work</div>
      ${field("turnaround","How fast can you turn a 30-90 second reel around from raw, in this style? And how many a week can you take on?",{type:"textarea"})}
      ${field("availability","Full-time or freelance? When can you start? Any other commitments?",{type:"textarea"})}
    </div>

    <div class="card">
      <div class="sec-k">Rate (USD)</div>
      ${field("rate","Your rate: per reel in USD, and your monthly retainer (USD)",{type:"textarea",ph:"e.g. $25 per reel; $1,500/month retainer"})}
    </div>

    <div class="card">
      <div class="sec-k">Anything else</div>
      ${field("notes","Optional, anything you want us to know",{type:"textarea",required:false})}
      <button class="btn btn-primary" id="submitBtn" style="margin-top:8px">Send application</button>
      <p class="microcopy">We reply to everyone who makes the shortlist. Shortlisted editors get a short paid trial edit.</p>
    </div>`;

  document.querySelectorAll('[data-single] .opt').forEach(o=>o.addEventListener('click',()=>{
    o.parentElement.querySelectorAll('.opt').forEach(s=>s.classList.remove('sel'));
    o.classList.add('sel');
    o.closest('.field').classList.remove('err');
  }));
  document.querySelectorAll('.field input,.field textarea').forEach(el=>{
    el.addEventListener('input',()=>el.closest('.field').classList.remove('err'));
  });
  document.getElementById('submitBtn').addEventListener('click',submit);
  if(!CONFIG.endpoint) document.getElementById('demoTag').style.display='block';
}

const TEXT_REQ = ["name","email","instagram","whatsapp","timezone","portfolio","sample","sample_role","turnaround","availability","rate"];
const SINGLE_REQ = ["capcut"];

function submit(){
  let firstErr=null;
  const val = id => (document.getElementById(id)?.value||"").trim();
  const pick = id => document.querySelector(`[data-for="${id}"] .opt.sel`)?.dataset.v || "";

  TEXT_REQ.forEach(id=>{
    const f=document.querySelector(`[data-for="${id}"]`);
    if(!val(id)){ f.classList.add('err'); firstErr=firstErr||f; }
  });
  SINGLE_REQ.forEach(id=>{
    const f=document.querySelector(`[data-for="${id}"]`);
    if(!pick(id)){ f.classList.add('err'); firstErr=firstErr||f; }
  });

  const es=document.getElementById('errSummary');
  if(firstErr){ es.classList.add('show'); firstErr.scrollIntoView({behavior:'smooth',block:'center'}); return; }
  es.classList.remove('show');

  const payload = {
    role: CONFIG.role, role_label: CONFIG.role_label,
    name: val("name"), email: val("email"), whatsapp: val("whatsapp"), location: val("timezone"),
    comp_expectation: val("rate"),
    links: { portfolio: val("portfolio"), sample: val("sample") },
    answers: {
      instagram: val("instagram"), capcut: pick("capcut"), sample_role: val("sample_role"),
      turnaround: val("turnaround"), availability: val("availability"),
      rate: val("rate"), notes: val("notes")
    },
    source: "hiring-form",
    ref_source: (localStorage.getItem('ms_first_source')||""),
    page: location.href
  };

  if(CONFIG.endpoint){
    fetch(CONFIG.endpoint,{
      method:"POST",
      headers:{ "Content-Type":"application/json",
        ...(CONFIG.anonKey?{"Authorization":"Bearer "+CONFIG.anonKey,"apikey":CONFIG.anonKey}:{}) },
      body: JSON.stringify(payload)
    }).catch(()=>{});
  }
  showThanks();
}

function showThanks(){
  document.getElementById('errSummary')?.remove();
  document.getElementById('app').innerHTML = `
    <div class="card thanks fade">
      <div class="big"></div>
      <h1>Application in.</h1>
      <p class="lead">Thanks, we read every one. If you make the shortlist we'll message your WhatsApp with a short paid trial: a quick edit of raw footage we provide, in this style.</p>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

renderForm();
</script>
</body>
</html>
